name: Auto Assign

on:
  issue_comment:
    types: [created]

jobs:
  assign:
    runs-on: ubuntu-latest
    if: |
      !github.event.issue.pull_request &&
      (
        contains(toJSON(github.event.comment.body), 'assign me') ||
        contains(toJSON(github.event.comment.body), 'take this') ||
        contains(toJSON(github.event.comment.body), 'work on this') ||
        contains(toJSON(github.event.comment.body), 'work on it') ||
        contains(toJSON(github.event.comment.body), 'claim this') ||
        contains(toJSON(github.event.comment.body), 'pick this up') ||
        contains(toJSON(github.event.comment.body), 'take this up') ||
        contains(toJSON(github.event.comment.body), 'give it a shot') ||
        contains(toJSON(github.event.comment.body), 'give this a shot') ||
        contains(toJSON(github.event.comment.body), 'tackle this')
      )
    permissions:
      issues: write
    steps:
      - name: Assign commenter
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUM=${{ github.event.issue.number }}
          COMMENTER=${{ github.event.comment.user.login }}
          REPO=${{ github.repository }}

          # Check if already assigned
          ASSIGNEES=$(gh api repos/$REPO/issues/$ISSUE_NUM --jq '.assignees[].login')

          if echo "$ASSIGNEES" | grep -q "^$COMMENTER$"; then
            echo "Already assigned to $COMMENTER"
            exit 0
          fi

          # Check if someone else is already assigned
          if [ -n "$ASSIGNEES" ]; then
            gh issue comment $ISSUE_NUM --repo $REPO --body "This issue is already assigned. Please pick another one!"
            exit 0
          fi

          # Assign
          gh issue edit $ISSUE_NUM --repo $REPO --add-assignee "$COMMENTER"
          gh issue comment $ISSUE_NUM --repo $REPO --body "Assigned to @$COMMENTER. Good luck!"
